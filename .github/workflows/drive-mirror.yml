name: Mirror main to Google Drive

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zhong-google-drive-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether cloud publishing is enabled
        id: auth
        shell: bash
        env:
          DRIVE_TOKEN: ${{ secrets.GDRIVE_RCLONE_TOKEN }}
        run: |
          if [ -n "$DRIVE_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GDRIVE_RCLONE_TOKEN is not configured; Drive publishing is disabled."
          fi

      - name: Check out the exact commit
        if: steps.auth.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rclone 1.74.4
        if: steps.auth.outputs.enabled == 'true'
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          curl -fsSLO https://downloads.rclone.org/v1.74.4/rclone-v1.74.4-linux-amd64.zip
          echo 'fe435e0c36228e7c2f116a8701f01127bb1f694005fc11d1f27186c8bca4115d  rclone-v1.74.4-linux-amd64.zip' | sha256sum -c -
          unzip -q rclone-v1.74.4-linux-amd64.zip
          mkdir -p "$RUNNER_TEMP/bin"
          install -m 0755 rclone-v1.74.4-linux-amd64/rclone "$RUNNER_TEMP/bin/rclone"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Publish the committed snapshot
        if: steps.auth.outputs.enabled == 'true'
        env:
          RCLONE_CONFIG_GDRIVE_TYPE: drive
          RCLONE_CONFIG_GDRIVE_SCOPE: drive
          RCLONE_CONFIG_GDRIVE_TOKEN: ${{ secrets.GDRIVE_RCLONE_TOKEN }}
          RCLONE_CONFIG_GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_RCLONE_CLIENT_ID }}
          RCLONE_CONFIG_GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_RCLONE_CLIENT_SECRET }}
          ZHONG_DRIVE_REMOTE: gdrive
        run: python3 scripts/drive_sync.py push --commit "$GITHUB_SHA" --apply
